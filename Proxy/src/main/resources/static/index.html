<!DOCTYPE html>
<html>
<head>
    <title>Pell Sequence</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Calcular Pell Sequence</h1>

    <form>
        <label for="num">Ingrese n:</label><br>
        <input type="text" id="num"><br><br>
        <input type="button" value="Calcular" onclick="loadFib()">
    </form>

    <div id="resp"></div>

    <script>
        function loadFib() {
            let n = document.getElementById("num").value;

            const xhttp = new XMLHttpRequest();
            xhttp.onload = function() {
                document.getElementById("resp").innerHTML = this.responseText;
            }

            xhttp.open("GET", "/pellseq?n=" + n);
            xhttp.send();
        }
    </script>
</body>
</html>
